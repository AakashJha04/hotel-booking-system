spring.application.name=airBnbApp
# Real secrets live in application-secrets.properties (gitignored)
spring.config.import=optional:classpath:application-secrets.properties

#DB Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/airbnbDB
spring.datasource.username=user
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.servlet.context-path=/api/v1

jwt.secretKey=${JWT_SECRET:change-this-dev-secret}

frontend.url=http://localhost:3000
stripe.secret.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}